<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fixed-Time Running Analysis</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<header>
<div class="container">
<h1><a href="index.html">Fixed-Time Running Analysis</a></h1>
</div>
</header>
<main class="container">
<div class="hero">
<h2>Compare Fixed-Time Race Performances</h2>
<p>Select performances to overlay mile-by-mile splits, pacing strategies, and time gaps.</p>
</div>

<div class="filters">
<select id="filterDistance"></select>
<select id="filterRace"></select>
<input type="text" id="filterRunner" placeholder="Search runner...">
</div>

<div class="perf-list" id="perfList">
<div class="loading">Loading performances...</div>
</div>

<div class="charts-section" id="chartsSection" style="display:none"></div>
</main>

<div class="compare-bar" id="compareBar">
<button class="compare-btn" id="compareBtn" disabled>Compare</button>
</div>

<footer><div class="container">Built by <a href="https://github.com/nickcoury">Nick Coury</a> &amp; Claw</div></footer>
<script src="js/app.js"></script>
</body>
</html>
