<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fixed-Time Running Analysis</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<header>
<div class="container">
<h1><a href="index.html">Fixed-Time Running Analysis</a></h1>
</div>
</header>
<main class="container">

<!-- Selection Area -->
<div class="selection-area">
  <!-- Selection Pill -->
  <div class="selection-pill">
    <button class="pill-half pill-browse active" id="pillBrowse">Browse Runners</button>
    <button class="pill-half pill-selected" id="pillSelected">
      Selected <span class="pill-count" id="pillCount">0</span>
    </button>
  </div>

  <!-- Quick Picks -->
  <div class="quick-picks" id="quickPicks">
    <span class="quick-picks-label">Quick picks:</span>
  </div>

  <!-- Filters (visible in Browse mode) -->
  <div class="filter-bar" id="filterBar">
    <input type="text" id="searchInput" placeholder="Search runner, race, or country..." autocomplete="off">
    <select id="filterDistance"><option value="">All distances</option></select>
    <select id="filterRace"><option value="">All races</option></select>
    <select id="filterCountry"><option value="">All countries</option></select>
    <select id="filterGender"><option value="">All</option><option value="M">Men</option><option value="F">Women</option></select>
  </div>

  <!-- Browse view -->
  <div class="browse-view" id="browseView">
    <div class="results-header" id="resultsHeader"></div>
    <div class="perf-list" id="perfList">
      <div class="loading">Loading performances...</div>
    </div>
  </div>

  <!-- Selected view (cart) -->
  <div class="cart-view" id="cartView" style="display:none">
    <div class="cart-empty" id="cartEmpty">No runners selected. Browse and add some!</div>
    <div class="cart-list" id="cartList"></div>
    <div class="cart-actions" id="cartActions" style="display:none">
      <button class="btn-clear" id="clearAll">Clear All</button>
    </div>
  </div>
</div>

<!-- Visualization Area -->
<div class="viz-area" id="vizArea" style="display:none">
  <div class="viz-tabs" id="vizTabs">
    <button class="viz-tab active" data-viz="projection">Pacing Projection</button>
    <button class="viz-tab" data-viz="pace">Pace Overlay</button>
    <button class="viz-tab" data-viz="gap">Time Gap</button>
    <button class="viz-tab" data-viz="heatmap">Split Heatmap</button>
  </div>

  <div class="viz-controls" id="vizControls"></div>
  <div class="viz-content" id="vizContent"></div>
</div>

</main>

<footer><div class="container">Built by <a href="https://github.com/nickcoury">Nick Coury</a> &amp; Claw</div></footer>
<script src="js/app.js"></script>
</body>
</html>
